<style>
  :root {
    --bg: #080c14;
    --panel: #0d1321;
    --border: #1a2540;
    --accent: #00f0ff;
    --text: #cdd6f4;
    --muted: #6272a4;
    --fam: #ff79c6;
    --alumni: #50fa7b;
    --hiring: #ffb86c;
    --professor: #bd93f9;
    --colleague: #8be9fd;
    --other: #f1fa8c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    z-index: 10;
    flex-shrink: 0;
  }

  .logo {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .logo span { color: var(--text); }

  .stats {
    display: flex;
    gap: 24px;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
  }

  .stats b { color: var(--accent); }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .filter-label {
    font-size: 0.68rem;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-right: 4px;
  }

  .chip {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-family: 'Space Mono', monospace;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .chip.active { opacity: 1; }
  .chip:not(.active) { opacity: 0.35; }
  .chip:hover { opacity: 0.8; transform: translateY(-1px); }

  .chip-fam        { color: var(--fam);      border-color: var(--fam);      background: rgba(255,121,198,0.08); }
  .chip-alumni     { color: var(--alumni);   border-color: var(--alumni);   background: rgba(80,250,123,0.08); }
  .chip-hiring     { color: var(--hiring);   border-color: var(--hiring);   background: rgba(255,184,108,0.08); }
  .chip-professor  { color: var(--professor);border-color: var(--professor);background: rgba(189,147,249,0.08); }
  .chip-colleague  { color: var(--colleague);border-color: var(--colleague);background: rgba(139,233,253,0.08); }
  .chip-other      { color: var(--other);    border-color: var(--other);    background: rgba(241,250,140,0.08); }

  .search-wrap {
    margin-left: auto;
    position: relative;
  }

  .search-wrap input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 12px 5px 30px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-family: 'Space Mono', monospace;
    width: 180px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1rem;
  }

  /* MAIN */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  #graph {
    flex: 1;
    height: 100%;
  }

  /* SIDEBAR */
  .sidebar {
    width: 320px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: transform 0.3s ease;
    overflow: hidden;
    flex-shrink: 0;
  }

  .sidebar.hidden {
    transform: translateX(100%);
    width: 0;
    border: none;
  }

  .sidebar-header {
    padding: 20px 20px 14px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .sidebar-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.1rem;
    line-height: 1;
    transition: color 0.2s;
  }

  .sidebar-close:hover { color: var(--text); }

  .node-name {
    font-size: 1.2rem;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 6px;
  }

  .node-role {
    font-size: 0.78rem;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-bottom: 8px;
  }

  .node-org {
    font-size: 0.75rem;
    font-family: 'Space Mono', monospace;
  }

  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-right: 6px;
    margin-bottom: 4px;
  }

  .sidebar-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .section-label {
    font-size: 0.62rem;
    font-family: 'Space Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin: 16px 0 8px;
  }

  .section-label:first-child { margin-top: 0; }

  .info-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    font-size: 0.78rem;
  }

  .info-row a {
    color: var(--accent);
    text-decoration: none;
    word-break: break-all;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
  }

  .info-row a:hover { text-decoration: underline; }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
  }

  .notes-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 0.76rem;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
  }

  .connections-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .conn-tag {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.68rem;
    font-family: 'Space Mono', monospace;
    background: var(--bg);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .conn-tag:hover { border-color: var(--accent); color: var(--accent); }

  /* EMPTY STATE */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    text-align: center;
    padding: 24px;
    gap: 10px;
  }

  .empty-icon { font-size: 2rem; opacity: 0.3; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* PASSWORD GATE */
  #gate {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 0;
  }

  .gate-box {
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 44px;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: 360px;
    box-shadow: 0 0 60px rgba(0,240,255,0.06);
  }

  .gate-title {
    font-size: 1.3rem;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .gate-sub {
    font-size: 0.72rem;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
    margin-top: -8px;
  }

  .gate-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 0.9rem;
    font-family: 'Space Mono', monospace;
    outline: none;
    text-align: center;
    letter-spacing: 0.15em;
    transition: border-color 0.2s;
  }

  .gate-input:focus { border-color: var(--accent); }

  .gate-btn {
    width: 100%;
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 12px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    text-transform: uppercase;
    transition: opacity 0.2s, transform 0.1s;
  }

  .gate-btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .gate-btn:active { transform: translateY(0); }

  .gate-error {
    font-size: 0.68rem;
    font-family: 'Space Mono', monospace;
    color: #ff5555;
    display: none;
    margin-top: -8px;
  }

  .gate-error.show { display: block; }
</style>

  <div class="search-wrap">

  </div>
</div>

<div class="main">

      <div class="empty-state">
        <div class="empty-icon">◎</div>
        <div>Click a node to view details</div>
      </div>
    </div>
  </div>
</div>

// ============================================================
const CAT_COLORS = {
  "Fam/Friend":     { color: "#ff79c6", highlight: "#ffb3e0", bg: "rgba(255,121,198,0.15)" },
  "Alumni":         { color: "#50fa7b", highlight: "#a0fbb8", bg: "rgba(80,250,123,0.15)" },
  "Hiring Manager": { color: "#ffb86c", highlight: "#ffd4a8", bg: "rgba(255,184,108,0.15)" },
  "Professor":      { color: "#bd93f9", highlight: "#ddc8ff", bg: "rgba(189,147,249,0.15)" },
  "Colleague":      { color: "#8be9fd", highlight: "#c0f4ff", bg: "rgba(139,233,253,0.15)" },
  "Other":          { color: "#f1fa8c", highlight: "#ffffc0", bg: "rgba(241,250,140,0.15)" },

};

  "self":      { label: "YOU",              color: "#00f0ff", bg: "rgba(0,240,255,0.15)" },
  "met":       { label: "Meeting Had",      color: "#50fa7b", bg: "rgba(80,250,123,0.15)" },

// ============================================================
// VIS.JS SETUP
// ============================================================
let network, nodesDS, edgesDS;
let activeFilters = new Set(["Fam/Friend","Alumni","Hiring Manager","Professor","Colleague","Other","self"]);
let selectedNode = null;

// Shape colors for companies and applications
const NODE_TYPE_COLORS = {
  company:     { color: "#ffb86c", highlight: "#ffd4a8", bg: "rgba(255,184,108,0.13)" },
  application: { color: "#50fa7b", highlight: "#a0fbb8", bg: "rgba(80,250,123,0.10)" }
};

function buildNodes(contacts) {
  // Count how many times each id appears as a connection target (inbound degree)
  const inbound = {};
  contacts.forEach(c => {
    (c.connections || []).forEach(tid => {
      inbound[tid] = (inbound[tid] || 0) + 1;
    });
  });

  return contacts.map(c => {
    const isSelf = c.status === "self";
    const nodeType = c.nodeType || "person";

    // Color: companies and applications have their own palette
    let col;
    if (isSelf) col = CAT_COLORS["self"];
    else if (nodeType === "company") col = NODE_TYPE_COLORS.company;
    else if (nodeType === "application") col = NODE_TYPE_COLORS.application;
    else col = CAT_COLORS[c.category] || CAT_COLORS["Other"];

    // Size based on total degree (own connections + inbound references)
    const ownConns = (c.connections || []).length;
    const inboundConns = inbound[c.id] || 0;
    const totalDegree = ownConns + inboundConns;
    const size = isSelf ? 38 : Math.max(18, 14 + totalDegree * 5);

    // Shape
    let shape;
    if (isSelf || nodeType === "person") shape = "dot";
    else if (nodeType === "company") shape = "square";
    else if (nodeType === "application") shape = "triangle";
    else shape = "dot";

    return {
      id: c.id,
      label: c.name,
      title: [c.role, c.org].filter(Boolean).join(" · ") || "",
      color: {
        background: col.bg,
        border: col.color,
        highlight: { background: col.bg, border: col.highlight },
        hover: { background: col.bg, border: col.highlight }
      },
      font: { color: col.color, size: isSelf ? 16 : 13, face: "Syne", bold: isSelf },
      size,
      shape,
      borderWidth: isSelf ? 3 : 2,
      borderWidthSelected: 3,
      shadow: { enabled: true, color: col.color + "55", size: isSelf ? 20 : 10, x: 0, y: 0 },
      category: c.category,
      nodeType,
      hidden: false
    };
  });
}

function buildEdges(contacts) {
  const edges = [];
  const seen = new Set();
  contacts.forEach(c => {
    (c.connections || []).forEach(tid => {
      const key = [Math.min(c.id, tid), Math.max(c.id, tid)].join("-");
      if (!seen.has(key)) {
        seen.add(key);
        edges.push({
          from: c.id, to: tid,
          color: { color: "#1a2540", highlight: "#00f0ff44", hover: "#00f0ff44" },
          width: 1.5,
          smooth: { type: "dynamic" }
        });
      }
    });
  });
  return edges;
}

function initGraph() {
  nodesDS = new vis.DataSet(buildNodes(CONTACTS));
  edgesDS = new vis.DataSet(buildEdges(CONTACTS));

  const container = document.getElementById("graph");
  network = new vis.Network(container, { nodes: nodesDS, edges: edgesDS }, {
    physics: {
      enabled: true,
      barnesHut: { gravitationalConstant: -8000, centralGravity: 0.3, springLength: 140, springConstant: 0.04, damping: 0.2 }
    },
    interaction: { hover: true, tooltipDelay: 100, hideEdgesOnDrag: false },
    nodes: { scaling: { min: 10, max: 50 } },
    edges: { arrows: { to: { enabled: false } } }
  });

  network.on("click", params => {
    if (params.nodes.length > 0) openSidebar(params.nodes[0]);
    else closeSidebar();
  });

  updateStats();
}

// ============================================================
// SIDEBAR
// ============================================================
function openSidebar(nodeId) {
  selectedNode = nodeId;
  const c = CONTACTS.find(x => x.id === nodeId);
  if (!c) return;

  const col = c.status === "self" ? CAT_COLORS["self"] : (CAT_COLORS[c.category] || CAT_COLORS["Other"]);
  const nodeType = c.nodeType || "person";
  const st = STATUS_CONFIG[c.status] || STATUS_CONFIG["pending"];

  document.getElementById("s-name").textContent = c.name;
  document.getElementById("s-role").textContent = [c.role, c.org].filter(Boolean).join(" · ") || "No role/org added yet";

  const nodeTypeLabel = nodeType === "company" ? "🟧 Org/Company" : nodeType === "application" ? "🔺 Application" : "● Person";
  const nodeTypeBadgeColor = nodeType === "company" ? "#ffb86c" : nodeType === "application" ? "#50fa7b" : col.color;
  const badgesEl = document.getElementById("s-badges");
  badgesEl.innerHTML = `
    <span class="badge" style="background:${col.bg};color:${col.color};border:1px solid ${col.color}44">${c.category}</span>
    <span class="badge" style="background:rgba(255,255,255,0.05);color:${nodeTypeBadgeColor};border:1px solid ${nodeTypeBadgeColor}44">${nodeTypeLabel}</span>
    <span class="badge" style="background:${st.bg};color:${st.color};border:1px solid ${st.color}44">${st.label}</span>
  `;

  const connNames = (c.connections || []).map(id => {
    const contact = CONTACTS.find(x => x.id === id);
    return contact ? `<span class="conn-tag" onclick="openSidebar(${id})">${contact.name}</span>` : "";
  }).join("");

  document.getElementById("sidebar-body").innerHTML = `
    ${(c.role || c.org) ? `
      <div class="section-label">Role</div>
      <div class="info-row" style="font-size:0.82rem">${[c.role, c.org].filter(Boolean).join(" · ")}</div>
    ` : ""}
    ${c.linkedin ? `
      <div class="section-label">LinkedIn</div>
      <div class="info-row">🔗 <a href="${c.linkedin}" target="_blank">${c.linkedin}</a></div>
    ` : (nodeType === "person" ? `
      <div class="section-label">LinkedIn</div>
      <div class="info-row" style="color:var(--muted);font-size:0.74rem;font-family:'Space Mono',monospace">— not added yet</div>
    ` : "")}
    ${(nodeType === "application" || nodeType === "company") && c.email ? `
      <div class="section-label">Link</div>
      <div class="info-row">🔗 <a href="${c.email}" target="_blank">${c.email}</a></div>
    ` : (nodeType === "person" && c.email ? `
      <div class="section-label">Email</div>
      <div class="info-row">✉ <a href="mailto:${c.email}">${c.email}</a></div>
    ` : "")}
    ${c.notes ? `
      <div class="section-label">Notes</div>
      <div class="notes-box">${c.notes}</div>
    ` : ""}
    ${connNames ? `
      <div class="section-label">Connections (${c.connections.length})</div>
      <div class="connections-list">${connNames}</div>
    ` : ""}
  `;

  const sidebar = document.getElementById("sidebar");
  sidebar.classList.remove("hidden");
}

function closeSidebar() {
  document.getElementById("sidebar").classList.add("hidden");
  selectedNode = null;
  if (network) network.unselectAll();
}

// ============================================================
// FILTERS & SEARCH
// ============================================================
function toggleFilter(chip) {
  const cat = chip.dataset.cat;
  if (activeFilters.has(cat)) {
    if (activeFilters.size === 1) return;
    activeFilters.delete(cat);
    chip.classList.remove("active");
  } else {
    activeFilters.add(cat);
    chip.classList.add("active");
  }
  applyVisibility();
}

function handleSearch(val) {
  applyVisibility(val.toLowerCase());
}

function applyVisibility(search = "") {
  const updates = CONTACTS.map(c => {
    const catMatch = c.status === "self" || activeFilters.has(c.category);
    const searchMatch = !search ||
      c.name.toLowerCase().includes(search) ||
      (c.org || "").toLowerCase().includes(search) ||
      (c.role || "").toLowerCase().includes(search);
    return { id: c.id, hidden: !(catMatch && searchMatch) };
  });
  nodesDS.update(updates);
}

// ============================================================
// STATS
// ============================================================
function updateStats() {
  const real = CONTACTS.filter(c => c.status !== "self");
  const people = real.filter(c => (c.nodeType || "person") === "person");
  const companies = real.filter(c => c.nodeType === "company");
  const apps = real.filter(c => c.nodeType === "application");
  document.getElementById("stat-total").textContent = people.length;
  document.getElementById("stat-met").textContent = real.filter(c => c.status === "met").length;
  document.getElementById("stat-replied").textContent = companies.length;
  document.getElementById("stat-sent").textContent = apps.length;
}
