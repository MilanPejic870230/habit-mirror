<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Mirror</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #050508; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 8px #00f5ff44; } 50% { box-shadow: 0 0 18px #00f5ff99; } }
    @keyframes dotPulse { 0%,100% { box-shadow: 0 0 4px #bf00ff; } 50% { box-shadow: 0 0 10px #bf00ff; } }
    @keyframes scanMove { from { background-position: 0 0; } to { background-position: 0 8px; } }
    .cal-wrap { background: #080810; border-radius: 16px; padding: 32px; font-family: 'Orbitron', monospace; width: 900px; max-width: 98vw; position: relative; overflow: hidden; }
    .scanline { position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,245,255,0.012) 3px, rgba(0,245,255,0.012) 4px); animation: scanMove 2s linear infinite; pointer-events: none; border-radius: 16px; }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; position: relative; z-index: 1; }
    .cal-title { font-size: 22px; font-weight: 700; letter-spacing: 5px; background: linear-gradient(90deg, #00f5ff, #bf00ff, #ff006e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .cal-nav button { background: none; border: 1px solid #2a2a3a; color: #666; padding: 7px 16px; border-radius: 6px; cursor: pointer; font-family: 'Orbitron', monospace; font-size: 10px; letter-spacing: 1px; transition: all 0.25s; margin-left: 8px; }
    .cal-nav button:hover { border-color: #00f5ff; color: #00f5ff; box-shadow: 0 0 10px #00f5ff33; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; position: relative; z-index: 1; }
    .cal-day-label { text-align: center; font-size: 9px; color: #3a3a55; padding: 4px 0 10px; letter-spacing: 2px; }
    .cal-day { min-height: 90px; border-radius: 8px; border: 1px solid #1e1e30; background: #0e0e1c; padding: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s, transform 0.15s; position: relative; overflow: hidden; animation: fadeIn 0.35s ease both; }
    .cal-day:hover { border-color: #00f5ff66; background: #111128; transform: scale(1.03); }
    .cal-day.has-note { border-color: #bf00ff55; background: #110820; }
    .cal-day.has-note:hover { border-color: #bf00ff99; }
    .cal-day.today { border-color: #00f5ff; animation: pulse 2.5s ease-in-out infinite, fadeIn 0.35s ease both; }
    .cal-day.other-month { opacity: 0.18; pointer-events: none; }
    .cal-day-num { font-size: 12px; color: #6666aa; margin-bottom: 6px; transition: color 0.2s; }
    .cal-day:hover .cal-day-num { color: #9999cc; }
    .cal-day.today .cal-day-num { color: #00f5ff; }
    .cal-day.has-note .cal-day-num { color: #aa88dd; }
    .cal-day-note { font-size: 9px; color: #7755aa; letter-spacing: 0.3px; line-height: 1.4; word-break: break-word; font-family: monospace; }
    .cal-day.has-note .cal-day-note { color: #cc99ff; }
    .dot { position: absolute; bottom: 6px; right: 6px; width: 5px; height: 5px; border-radius: 50%; background: #bf00ff; animation: dotPulse 2s ease-in-out infinite; }
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,8,0.88); z-index: 100; align-items: center; justify-content: center; }
    .modal-bg.open { display: flex; }
    .modal { background: #0c0c1a; border: 1px solid #00f5ff44; border-radius: 14px; padding: 28px; width: 360px; animation: fadeIn 0.2s ease; }
    .modal-title { font-size: 11px; color: #00f5ff; letter-spacing: 3px; margin-bottom: 16px; }
    .modal textarea { width: 100%; background: #080810; border: 1px solid #222238; color: #bbbbd0; border-radius: 6px; padding: 10px; font-size: 12px; font-family: monospace; resize: vertical; min-height: 110px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    .modal textarea:focus { border-color: #bf00ff; box-shadow: 0 0 10px #bf00ff22; }
    .modal-btns { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }
    .modal-btns button { font-family: 'Orbitron', monospace; font-size: 9px; letter-spacing: 1px; padding: 8px 18px; border-radius: 6px; cursor: pointer; border: 1px solid #2a2a3a; background: none; color: #666; transition: all 0.2s; }
    .btn-save { border-color: #00f5ff88 !important; color: #00f5ff !important; }
    .btn-save:hover { background: #00f5ff15 !important; box-shadow: 0 0 10px #00f5ff33; }
    .btn-clear { border-color: #ff006e44 !important; color: #ff006e88 !important; }
    .btn-clear:hover { background: #ff006e11 !important; }
    .btn-cancel:hover { background: #ffffff08; color: #aaa; }
  </style>
</head>
<body>
<div class="cal-wrap">
  <div class="scanline"></div>
  <div class="cal-header">
    <div class="cal-title" id="cal-title">JULY 2026</div>
    <div class="cal-nav">
      <button onclick="changeMonth(-1)">&#9664; PREV</button>
      <button onclick="changeMonth(1)">NEXT &#9654;</button>
    </div>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">// LOG ENTRY</div>
    <textarea id="modal-input" placeholder="enter note..."></textarea>
    <div class="modal-btns">
      <button class="btn-clear" onclick="clearNote()">CLEAR</button>
      <button class="btn-cancel" onclick="closeModal()">CANCEL</button>
      <button class="btn-save" onclick="saveNote()">SAVE</button>
    </div>
  </div>
</div>

<script>
  const notes = JSON.parse(localStorage.getItem('mirror-notes') || '{}');
  let cur = new Date();
  let selKey = null;
  const MONTHS = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
  const DAYS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

  function key(y,m,d){ return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

  function save(){ localStorage.setItem('mirror-notes', JSON.stringify(notes)); }

  function render(){
    const y=cur.getFullYear(), m=cur.getMonth();
    document.getElementById('cal-title').textContent=`${MONTHS[m]} ${y}`;
    const grid=document.getElementById('cal-grid');
    grid.innerHTML=DAYS.map(d=>`<div class="cal-day-label">${d}</div>`).join('');
    const first=new Date(y,m,1).getDay();
    const days=new Date(y,m+1,0).getDate();
    const today=new Date();
    for(let i=0;i<first;i++){
      const pd=new Date(y,m,-first+i+1);
      grid.innerHTML+=`<div class="cal-day other-month"><div class="cal-day-num">${pd.getDate()}</div></div>`;
    }
    for(let d=1;d<=days;d++){
      const k=key(y,m+1,d);
      const isToday=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
      const hasNote=notes[k]&&notes[k].trim();
      const snippet=hasNote?notes[k].slice(0,40)+(notes[k].length>40?'…':''):'';
      const delay=`animation-delay:${(d*0.03).toFixed(2)}s`;
      grid.innerHTML+=`<div class="cal-day${isToday?' today':''}${hasNote?' has-note':''}" style="${delay}" onclick="openModal('${k}',${y},${m+1},${d})">
        <div class="cal-day-num">${d}</div>
        <div class="cal-day-note">${snippet}</div>
        ${hasNote?'<div class="dot"></div>':''}
      </div>`;
    }
  }

  function changeMonth(dir){ cur=new Date(cur.getFullYear(),cur.getMonth()+dir,1); render(); }

  function openModal(k,y,m,d){
    selKey=k;
    document.getElementById('modal-title').textContent=`// LOG :: ${String(d).padStart(2,'0')}.${String(m).padStart(2,'0')}.${y}`;
    document.getElementById('modal-input').value=notes[k]||'';
    document.getElementById('modal').classList.add('open');
    setTimeout(()=>document.getElementById('modal-input').focus(),50);
  }

  function closeModal(){ document.getElementById('modal').classList.remove('open'); selKey=null; }
  function saveNote(){ if(selKey){ notes[selKey]=document.getElementById('modal-input').value; save(); } closeModal(); render(); }
  function clearNote(){ if(selKey){ notes[selKey]=''; save(); } closeModal(); render(); }
  document.getElementById('modal').addEventListener('click',e=>{ if(e.target===document.getElementById('modal')) closeModal(); });

  render();
</script>
</body>
</html>
